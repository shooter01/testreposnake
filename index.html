<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }
        
        .game-container {
            position: relative;
            margin-bottom: 20px;
        }
        
        canvas {
            border: 2px solid #333;
            border-radius: 5px;
            background-color: #111;
        }
        
        .score-panel {
            display: flex;
            justify-content: space-between;
            width: 400px;
            margin-bottom: 10px;
        }
        
        .controls {
            margin-top: 10px;
            text-align: center;
            color: #555;
        }
        
        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 16px;
            margin: 4px 2px;
            cursor: pointer;
            border-radius: 5px;
        }
        
        button:hover {
            background-color: #45a049;
        }
        
        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            display: none;
        }
        
        .game-over h2 {
            margin-top: 0;
            color: #ff4757;
        }
    </style>
</head>
<body>
    <h1>Snake Game</h1>
    
    <div class="score-panel">
        <div>Score: <span id="score">0</span></div>
        <div>High Score: <span id="highScore">0</span></div>
    </div>
    
    <div class="game-container">
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div id="gameOver" class="game-over">
            <h2>Game Over!</h2>
            <p>Your score: <span id="finalScore">0</span></p>
            <button onclick="resetGame()">Play Again</button>
        </div>
    </div>
    
    <div class="controls">
        <p>Use arrow keys to control the snake</p>
        <button onclick="resetGame()">New Game</button>
    </div>

    <script>
        // Game constants
        const CANVAS_SIZE = 400;
        const GRID_SIZE = 20;
        const GRID_COUNT = CANVAS_SIZE / GRID_SIZE;
        
        // Game variables
        let snake = [];
        let food = {};
        let score = 0;
        let highScore = 0;
        let direction = "right";
        let nextDirection = "right";
        let gameInterval;
        let gameRunning = false;
        
        // Get DOM elements
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const highScoreElement = document.getElementById('highScore');
        const gameOverElement = document.getElementById('gameOver');
        const finalScoreElement = document.getElementById('finalScore');
        
        // Initialize the game
        function initGame() {
            // Create initial snake (3 segments)
            snake = [
                {x: 5, y: 10},
                {x: 4, y: 10},
                {x: 3, y: 10}
            ];
            
            // Set initial direction
            direction = "right";
            nextDirection = "right";
            
            // Reset score
            score = 0;
            scoreElement.textContent = score;
            
            // Create initial food
            createFood();
            
            // Hide game over screen
            gameOverElement.style.display = "none";
            
            // Draw initial state
            draw();
        }
        
        // Create food at random position
        function createFood() {
            // Generate random position
            food = {
                x: Math.floor(Math.random() * GRID_COUNT),
                y: Math.floor(Math.random() * GRID_COUNT)
            };
            
            // Make sure food doesn't appear on snake
            for (let segment of snake) {
                if (segment.x === food.x && segment.y === food.y) {
                    // If food is on snake, try again
                    return createFood();
                }
            }
        }
        
        // Draw everything on canvas
        function draw() {
            // Clear canvas
            ctx.fillStyle = "#111";
            ctx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);
            
            // Draw snake
            for (let i = 0; i < snake.length; i++) {
                // Head is a different color
                if (i === 0) {
                    ctx.fillStyle = "#4CAF50"; // Green head
                } else {
                    ctx.fillStyle = "#8BC34A"; // Lighter green body
                }
                
                ctx.fillRect(snake[i].x * GRID_SIZE, snake[i].y * GRID_SIZE, GRID_SIZE, GRID_SIZE);
                
                // Add border to make segments distinct
                ctx.strokeStyle = "#111";
                ctx.strokeRect(snake[i].x * GRID_SIZE, snake[i].y * GRID_SIZE, GRID_SIZE, GRID_SIZE);
            }
            
            // Draw food
            ctx.fillStyle = "#FF5722"; // Orange food
            ctx.beginPath();
            ctx.arc(
                food.x * GRID_SIZE + GRID_SIZE / 2,
                food.y * GRID_SIZE + GRID_SIZE / 2,
                GRID_SIZE / 2,
                0,
                Math.PI * 2
            );
            ctx.fill();
        }
        
        // Update game state
        function update() {
            // Update direction from nextDirection
            direction = nextDirection;
            
            // Calculate new head position
            const head = {...snake[0]};
            
            switch (direction) {
                case "up":
                    head.y--;
                    break;
                case "down":
                    head.y++;
                    break;
                case "left":
                    head.x--;
                    break;
                case "right":
                    head.x++;
                    break;
            }
            
            // Check for collisions
            if (checkCollision(head)) {
                gameOver();
                return;
            }
            
            // Add new head
            snake.unshift(head);
            
            // Check if snake ate food
            if (head.x === food.x && head.y === food.y) {
                // Increase score
                score++;
                scoreElement.textContent = score;
                
                // Update high score if needed
                if (score > highScore) {
                    highScore = score;
                    highScoreElement.textContent = highScore;
                }
                
                // Create new food
                createFood();
            } else {
                // Remove tail
                snake.pop();
            }
            
            // Draw updated state
            draw();
        }
        
        // Check for collisions
        function checkCollision(head) {
            // Wall collision
            if (
                head.x < 0 ||
                head.y < 0 ||
                head.x >= GRID_COUNT ||
                head.y >= GRID_COUNT
            ) {
                return true;
            }
            
            // Self collision (check if head collides with any part of the body)
            for (let i = 1; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) {
                    return true;
                }
            }
            
            return false;
        }
        
        // Game over
        function gameOver() {
            gameRunning = false;
            clearInterval(gameInterval);
            
            // Show game over screen
            gameOverElement.style.display = "block";
            finalScoreElement.textContent = score;
        }
        
        // Reset game
        function resetGame() {
            // Clear previous interval if exists
            if (gameInterval) {
                clearInterval(gameInterval);
            }
            
            // Initialize game
            initGame();
            
            // Start game loop
            gameRunning = true;
            gameInterval = setInterval(update, 150);
        }
        
        // Handle keyboard controls
        document.addEventListener('keydown', (e) => {
            switch (e.key) {
                case 'ArrowUp':
                    e.preventDefault();
                    if (direction !== "down") { // Prevent 180-degree turns
                        nextDirection = "up";
                    }
                    break;
                case 'ArrowDown':
                    e.preventDefault();
                    if (direction !== "up") {
                        nextDirection = "down";
                    }
                    break;
                case 'ArrowLeft':
                    e.preventDefault();
                    if (direction !== "right") {
                        nextDirection = "left";
                    }
                    break;
                case 'ArrowRight':
                    e.preventDefault();
                    if (direction !== "left") {
                        nextDirection = "right";
                    }
                    break;
            }
        });
        
        // Load high score from localStorage if available
        window.addEventListener('load', () => {
            const savedHighScore = localStorage.getItem('snakeHighScore');
            if (savedHighScore) {
                highScore = parseInt(savedHighScore);
                highScoreElement.textContent = highScore;
            }
            
            // Start the game
            resetGame();
        });
        
        // Save high score when page is closed
        window.addEventListener('beforeunload', () => {
            if (score >= highScore) {
                localStorage.setItem('snakeHighScore', score.toString());
            }
        });
    </script>
</body>
</html>
